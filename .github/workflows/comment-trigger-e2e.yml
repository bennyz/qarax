name: Comment Trigger E2E

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

jobs:
  dispatch:
    name: Dispatch E2E
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) && contains(github.event.comment.body, '/run-e2e')
    steps:
      - name: Dispatch E2E workflow on PR merge ref
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: issue_number,
            });

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'rust-ci.yml',
              ref: 'master',
              inputs: { pr_number: String(issue_number) },
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `Dispatching E2E tests for PR #${issue_number} (${pr.head.sha.substring(0, 7)}). Watch the [Actions tab](https://github.com/${owner}/${repo}/actions/workflows/rust-ci.yml) for the new run.`,
            });
