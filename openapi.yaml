          format: uuid
      responses:
        '200':
          description: VM paused successfully
        '404':
          description: VM not found
        '500':
          description: Internal server error
  /vms/{vm_id}/resize:
    put:
      tags:
      - vms
      operationId: resize_vm
      parameters:
      - name: vm_id
        in: path
        description: VM unique identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VmResizeRequest'
        required: true
      responses:
        '200':
          description: VM resized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vm'
        '404':
          description: VM not found
        '422':
          description: VM not running, or resize parameters out of range
        '500':
          description: Internal server error
  /vms/{vm_id}/restore:
    post:
      tags:
      - vms
      operationId: restore
      parameters:
      - name: vm_id
        in: path
        description: VM unique identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreRequest'
        required: true
      responses:
        '200':
          description: VM restored from snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vm'
        '404':
          description: VM or snapshot not found
        '422':
          description: VM not in a restoreable state or snapshot not ready
        '500':
          description: Internal server error
  /vms/{vm_id}/resume:
    post:
      tags:
      - vms
      operationId: resume
      parameters:
      - name: vm_id
        in: path
        description: VM unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: VM resumed successfully
        '404':
          description: VM not found
        '500':
          description: Internal server error
  /vms/{vm_id}/security-groups:
    get:
      tags:
      - vms
      operationId: list_security_groups
      parameters:
      - name: vm_id
        in: path
        description: VM unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List security groups bound to the VM
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SecurityGroup'
        '404':
          description: VM not found
        '500':
          description: Internal server error
    post:
      tags:
      - vms
      operationId: attach_security_group
      parameters:
      - name: vm_id
        in: path
        description: VM unique identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachSecurityGroupRequest'
        required: true
      responses:
        '204':
          description: Security group bound to VM
        '404':
          description: VM or security group not found
        '500':
          description: Internal server error
  /vms/{vm_id}/security-groups/{security_group_id}:
    delete:
      tags:
      - vms
      operationId: detach_security_group
      parameters:
      - name: vm_id
        in: path
        description: VM unique identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: security_group_id
        in: path
        description: Security group unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Security group removed from VM
        '404':
          description: VM or security group not found
        '500':
          description: Internal server error
  /vms/{vm_id}/snapshots:
    get:
      tags:
      - vms
      operationId: list_snapshots
      parameters:
      - name: vm_id
        in: path
        description: VM unique identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: name
        in: query
        description: Optional name filter for list queries
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: List snapshots for a VM
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Snapshot'
        '404':
          description: VM not found
        '500':
          description: Internal server error
    post:
      tags:
      - vms
      operationId: create_snapshot
      parameters:
      - name: vm_id
        in: path
        description: VM unique identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSnapshotRequest'
        required: true
      responses:
        '201':
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
        '404':
          description: VM not found
        '500':
          description: Internal server error
  /vms/{vm_id}/start:
    post:
      tags:
      - vms
      operationId: start
      parameters:
      - name: vm_id
        in: path
        description: VM unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '202':
          description: VM start accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VmStartResponse'
        '404':
          description: VM not found
        '422':
          description: VM not in a startable state
        '500':
          description: Internal server error
  /vms/{vm_id}/stop:
    post:
      tags:
      - vms
      operationId: stop
      parameters:
      - name: vm_id
        in: path
        description: VM unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: VM stopped successfully
        '404':
          description: VM not found
        '500':
          description: Internal server error
  /vms/{vm_id}/template:
    post:
      tags:
      - vms
      operationId: create_template_from_vm
      parameters:
      - name: vm_id
        in: path
        description: VM unique identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVmTemplateFromVmRequest'
        required: true
      responses:
        '201':
          description: VM template created from VM
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: VM not found
        '409':
          description: VM template with name already exists
        '500':
          description: Internal server error
components:
  schemas:
    AcceleratorConfig:
      type: object
      description: Typed accelerator_config from instance types / VM requests
      required:
      - gpu_count
      properties:
        gpu_count:
          type: integer
          format: int32
        gpu_model:
          type:
          - string
          - 'null'
        gpu_vendor:
          type:
          - string
          - 'null'
        min_vram_bytes:
          type:
          - integer
          - 'null'
          format: int64
        prefer_local_numa:
          type: boolean
          description: When true (default), pin the VM to the NUMA node(s) local to its allocated GPU(s).
    AttachDiskRequest:
      type: object
      required:
      - storage_object_id
      properties:
        boot_order:
          type:
          - integer
          - 'null'
          format: int32
          description: 'Boot priority — lower is higher priority (default: `0`).'
        logical_name:
          type:
          - string
          - 'null'
          description: Logical device name inside the VM (e.g. "vda"); auto-generated if omitted.
        storage_object_id:
          type: string
          format: uuid
          description: 'Storage object ID (any type: disk, oci_image, iso, etc.).'
    AttachHostRequest:
      type: object
      required:
      - host_id
      - bridge_name
      properties:
        bridge_name:
          type: string
        host_id:
          type: string
          format: uuid
        parent_interface:
          type:
          - string
          - 'null'
    AttachPoolHostRequest:
      type: object
      required:
      - host_id
      properties:
        host_id:
          type: string
          format: uuid
    AttachSecurityGroupRequest:
      type: object
      required:
      - security_group_id
      properties:
        security_group_id:
          type: string
          format: uuid
    AuditAction:
      type: string
      enum:
      - create
      - update
      - delete
      - start
      - stop
      - force_stop
      - pause
      - resume
      - deploy
      - init
      - migrate
      - restore
      - attach_disk
      - remove_disk
      - add_nic
      - remove_nic
      - resize
      - commit
      - create_snapshot
      - restore_snapshot
      - create_template
      - node_upgrade
      - evacuate
    AuditLog:
      type: object
      required:
      - id
      - action
      - resource_type
      - resource_id
      - created_at
      properties:
        action:
          $ref: '#/components/schemas/AuditAction'
        created_at:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        metadata: {}
        resource_id:
          type: string
          format: uuid
        resource_name:
          type:
          - string
          - 'null'
        resource_type:
          $ref: '#/components/schemas/AuditResourceType'
    AuditResourceType:
      type: string
      enum:
      - vm
      - host
      - storage_pool
      - storage_object
      - network
      - security_group
      - boot_source
      - vm_template
      - instance_type
      - lifecycle_hook
      - transfer
      - sandbox
    BootMode:
      type: string
      enum:
      - kernel
      - firmware
    BootSource:
      type: object
      required:
      - id
      - name
      - kernel_image_id
      properties:
        description:
          type:
          - string
          - 'null'
        id:
          type: string
          format: uuid
        initrd_image_id:
          type:
          - string
          - 'null'
          format: uuid
        kernel_image_id:
          type: string
          format: uuid
        kernel_params:
          type:
          - string
          - 'null'
        name:
          type: string
    CommitVmRequest:
      type: object
      required:
      - storage_pool_id
      - size_bytes
      properties:
        size_bytes:
          type: integer
          format: int64
          description: Size of the committed disk in bytes.
        storage_pool_id:
          type: string
          format: uuid
          description: Storage pool to create the raw disk on (must be Local or NFS, attached to the VM's host).
    CommitVmResponse:
      type: object
      required:
      - vm_id
      - job_id
      properties:
        job_id:
          type: string
          format: uuid
        vm_id:
          type: string
          format: uuid
    ConfigureSandboxPoolRequest:
      type: object
      required:
      - min_ready
      properties:
        min_ready:
          type: integer
          format: int32
    CreateDiskRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Human-readable name for the resulting storage object.
        preallocate:
          type: boolean
          description: 'If true, use fallocate to reserve blocks upfront (default: sparse).'
        size_bytes:
          type:
          - integer
          - 'null'
          format: int64
          description: |-
            Logical size of the disk in bytes. Required when no source_url is given.
            When source_url is provided, this is optional and, if set, is used as the
            initial reported size until the download completes and the actual size is known.
        source_url:
          type:
          - string
          - 'null'
          description: |-
            Optional URL to populate the disk from (e.g. a cloud image). When set the
            operation becomes async and returns 202 with a job_id.
    CreateDiskResponse:
      type: object
      required:
      - storage_object_id
      properties:
        job_id:
          type:
          - string
          - 'null'
          format: uuid
          description: Only present when source_url was supplied and the operation is async.
        storage_object_id:
          type: string
          format: uuid
    CreateSandboxResponse:
      type: object
      required:
      - id
      - vm_id
      - job_id
      properties:
        id:
          type: string
          format: uuid
        job_id:
          type: string
          format: uuid
        vm_id:
          type: string
          format: uuid
    CreateSnapshotRequest:
      type: object
      properties:
        name:
          type:
          - string
          - 'null'
          description: Human-readable name for the snapshot (auto-generated if omitted).
        storage_pool_id:
          type:
          - string
          - 'null'
          format: uuid
          description: |-
            Storage pool to place the snapshot in. Defaults to the pool of the
            VM's primary disk, or any active non-OverlayBD pool.
    CreateVmResponse:
      type: object
      required:
      - vm_id
      - job_id
      properties:
        job_id:
          type: string
          format: uuid
        vm_id:
          type: string
          format: uuid
    CreateVmTemplateFromVmRequest:
      type: object
      required:
      - name
      properties:
        description:
          type:
          - string
          - 'null'
        name:
          type: string
    DeployHostRequest:
      type: object
      required:
      - image
      properties:
        image:
          type: string
          description: Fully-qualified bootc image reference to deploy on the host.
        install_bootc:
          type:
          - boolean
          - 'null'
          description: Install bootc before switching image. Defaults to true.
        reboot:
          type:
          - boolean
          - 'null'
          description: Reboot after `bootc switch`. Defaults to true.
        ssh_password:
          type:
          - string
          - 'null'
          description: Optional SSH password override for this deployment request.
        ssh_port:
          type:
          - integer
          - 'null'
          format: int32
          description: SSH port used to reach the host. Defaults to 22.
          minimum: 0
        ssh_private_key_path:
          type:
          - string
          - 'null'
          description: Optional SSH private key path on the qarax control-plane host.
        ssh_user:
          type:
          - string
          - 'null'
          description: SSH user override. Defaults to the host's registered `host_user`.
    DiskResizeRequest:
      type: object
      description: Request body for `PUT /vms/{vm_id}/disks/{disk_id}/resize`.
      required:
      - new_size_bytes
      properties:
        new_size_bytes:
          type: integer
          format: int64
          description: New disk size in bytes. Must be larger than the current size and a multiple of 1 MiB.
    ExecSandboxRequest:
      type: object
      required:
      - command
      properties:
        command:
          type: array
          items:
            type: string
        timeout_secs:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
    ExecSandboxResponse:
      type: object
      required:
      - exit_code
      - stdout
      - stderr
      - timed_out
