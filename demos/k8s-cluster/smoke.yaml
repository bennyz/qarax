apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-k8s
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-k8s
  template:
    metadata:
      labels:
        app: hello-k8s
    spec:
      containers:
      - name: hello
        image: 10.101.0.1:5000/nginxdemos/hello:plain-text
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hello-k8s
  namespace: demo
spec:
  type: NodePort
  selector:
    app: hello-k8s
  ports:
  - name: http
    port: 80
    targetPort: 80
    nodePort: 30080
