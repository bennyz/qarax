name: Rust CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: Run build and E2E for a PR merge ref
        required: false
        default: 'false'
      checkout_ref:
        description: Ref to check out for workflow_dispatch runs
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  OTEL_CARGO_FEATURES: "qarax/otel qarax-node/otel"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: qarax
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y musl-tools protobuf-compiler
      - name: Prepare sqlx
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx mig run
          cargo sqlx prepare --workspace
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/qarax
      - run: cargo clippy --workspace --features "${OTEL_CARGO_FEATURES}" -- -D warnings
        env:
          SQLX_OFFLINE: true

  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.run_e2e == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: qarax
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.checkout_ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y musl-tools protobuf-compiler
      - name: Prepare sqlx
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx mig run
          cargo sqlx prepare --workspace
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/qarax
      - name: Build
        run: cargo build --workspace --release --features "${OTEL_CARGO_FEATURES}"
        env:
          SQLX_OFFLINE: true
      - name: Upload binaries
        uses: actions/upload-artifact@v6
        with:
          name: binaries
          path: |
            target/x86_64-unknown-linux-musl/release/qarax-server
            target/x86_64-unknown-linux-musl/release/qarax-node
            target/x86_64-unknown-linux-musl/release/qarax-init
            target/x86_64-unknown-linux-musl/release/qarax
          retention-days: 1

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: qarax
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y musl-tools protobuf-compiler
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Prepare sqlx
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx mig run
          cargo sqlx prepare --workspace
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/qarax
      - name: Run tests
        run: cargo nextest run --workspace --features "${OTEL_CARGO_FEATURES}"
        env:
          SQLX_OFFLINE: true
          DATABASE_URL: postgres://postgres:password@localhost:5432/qarax
          TEST_DATABASE_URL: postgres://postgres:password@localhost:5432/qarax
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: password
          DATABASE_NAME: qarax

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    # Run on push to master, or on workflow_dispatch when explicitly requested.
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_e2e == 'true')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.checkout_ref || github.ref }}

      - name: Download binaries
        uses: actions/download-artifact@v7
        with:
          name: binaries
          path: target/x86_64-unknown-linux-musl/release/

      - name: Make binaries executable
        run: chmod +x target/x86_64-unknown-linux-musl/release/*

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Check KVM availability
        run: |
          if [ -e /dev/kvm ]; then
            echo "KVM is available"
            ls -la /dev/kvm
          else
            echo "KVM is NOT available - E2E tests will be skipped"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          use: true

      - name: Expose GitHub runtime for BuildKit cache
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: |
            e2e/pyproject.toml
            e2e/uv.lock
            python-sdk/pyproject.toml
            python-sdk/uv.lock

      - name: Install e2e dependencies
        run: sudo apt-get install -y qemu-utils

      - name: Run E2E tests
        run: SKIP_BUILD=1 ENABLE_OTEL=1 CLOUD_HYPERVISOR_VERSION=$(cat versions/cloud-hypervisor-version | tr -d '\n') bash e2e/run_e2e_tests.sh
        env:
          COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
          DOCKER_BUILDX: 1
          DOCKER_BUILD_CACHE_FROM: type=gha
          DOCKER_BUILD_CACHE_TO: type=gha,mode=max

      - name: Cleanup
        if: always()
        working-directory: e2e
        run: docker compose down -v
        env:
          COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
