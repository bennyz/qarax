openapi: 3.1.0
info:
  title: Qarax API
  description: REST API for managing virtual machines and hypervisor hosts
  license:
    name: ''
  version: 0.1.0
paths:
  /audit-logs:
    get:
      tags:
      - audit-logs
      operationId: list
      parameters:
      - name: resource_type
        in: query
        description: Filter by resource type (e.g. "vm", "host")
        required: false
        schema:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AuditResourceType'
      - name: resource_id
        in: query
        description: Filter by resource UUID
        required: false
        schema:
          type:
          - string
          - 'null'
          format: uuid
      - name: action
        in: query
        description: Filter by action (e.g. "create", "start", "delete")
        required: false
        schema:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/AuditAction'
      - name: limit
        in: query
        description: 'Maximum number of entries to return (default: 100, max: 1000)'
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
      responses:
        '200':
          description: List audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
        '400':
          description: Invalid query parameters
        '500':
          description: Internal server error
  /audit-logs/{audit_log_id}:
    get:
      tags:
      - audit-logs
      operationId: get
      parameters:
      - name: audit_log_id
        in: path
        description: Audit log entry ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Get audit log entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
        '404':
          description: Not found
        '500':
          description: Internal server error
  /boot-sources:
    get:
      tags:
      - boot-sources
      operationId: list
      parameters:
      - name: name
        in: query
        description: Optional name filter for list queries
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: List all boot sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BootSource'
        '500':
          description: Internal server error
    post:
      tags:
      - boot-sources
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBootSource'
        required: true
      responses:
        '201':
          description: Boot source created successfully
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Invalid input
        '500':
          description: Internal server error
  /boot-sources/{boot_source_id}:
    get:
      tags:
      - boot-sources
      operationId: get
      parameters:
      - name: boot_source_id
        in: path
        description: Boot source unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Boot source found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootSource'
        '404':
          description: Boot source not found
        '500':
          description: Internal server error
    delete:
      tags:
      - boot-sources
      operationId: delete
      parameters:
      - name: boot_source_id
        in: path
        description: Boot source unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Boot source deleted successfully
        '404':
          description: Boot source not found
        '500':
          description: Internal server error
  /hooks:
    get:
      tags:
      - hooks
      operationId: list
      parameters:
      - name: name
        in: query
        description: Optional name filter for list queries
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: List all lifecycle hooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LifecycleHook'
        '500':
          description: Internal server error
    post:
      tags:
      - hooks
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewLifecycleHook'
        required: true
      responses:
        '201':
          description: Lifecycle hook created successfully
          content:
            text/plain:
              schema:
                type: string
        '409':
          description: Hook with this name already exists
        '422':
          description: Invalid input
        '500':
          description: Internal server error
  /hooks/{hook_id}:
    get:
      tags:
      - hooks
      operationId: get
      parameters:
      - name: hook_id
        in: path
        description: Lifecycle hook unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Lifecycle hook found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifecycleHook'
        '404':
          description: Lifecycle hook not found
        '500':
          description: Internal server error
    delete:
      tags:
      - hooks
      operationId: delete
      parameters:
      - name: hook_id
        in: path
        description: Lifecycle hook unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Lifecycle hook deleted successfully
        '404':
          description: Lifecycle hook not found
        '500':
          description: Internal server error
    patch:
      tags:
      - hooks
      operationId: update
      parameters:
      - name: hook_id
        in: path
        description: Lifecycle hook unique identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLifecycleHook'
        required: true
      responses:
        '200':
          description: Lifecycle hook updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifecycleHook'
        '404':
          description: Lifecycle hook not found
        '500':
          description: Internal server error
  /hooks/{hook_id}/executions:
    get:
      tags:
      - hooks
      operationId: list_executions
      parameters:
      - name: hook_id
        in: path
        description: Lifecycle hook unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List hook executions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HookExecution'
        '404':
          description: Lifecycle hook not found
        '500':
          description: Internal server error
  /hosts:
    get:
      tags:
      - hosts
      operationId: list
      parameters:
      - name: name
        in: query
        description: Optional name filter for list queries
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: architecture
        in: query
        description: Optional architecture filter
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: List all hosts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Host'
        '500':
          description: Internal server error
    post:
      tags:
      - hosts
      operationId: add
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewHost'
        required: true
      responses:
        '201':
          description: Host created successfully
          content:
            text/plain:
              schema:
                type: string
        '409':
          description: Host with name already exists
        '422':
          description: Invalid input
        '500':
          description: Internal server error
  /hosts/{host_id}:
    patch:
      tags:
      - hosts
      operationId: update
      parameters:
      - name: host_id
        in: path
        description: Host unique identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHostRequest'
        required: true
      responses:
        '200':
          description: Host updated successfully
        '404':
          description: Host not found
        '500':
          description: Internal server error
  /hosts/{host_id}/deploy:
    post:
      tags:
      - hosts
      operationId: deploy
      parameters:
      - name: host_id
        in: path
        description: Host unique identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployHostRequest'
        required: true
      responses:
        '202':
          description: Host deployment accepted
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Host not found
        '422':
          description: Invalid input
        '500':
          description: Internal server error
  /hosts/{host_id}/evacuate:
    post:
      tags:
      - hosts
      operationId: evacuate
      parameters:
      - name: host_id
        in: path
        description: Host unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '202':
          description: Host evacuation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostEvacuateResponse'
        '404':
          description: Host not found
        '422':
          description: Host or resident VMs are not evacuatable
  /hosts/{host_id}/gpus:
    get:
      tags:
      - hosts
      operationId: list_gpus
      parameters:
      - name: host_id
        in: path
        description: Host unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List GPUs on the host
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HostGpu'
        '404':
          description: Host not found
        '500':
          description: Internal server error
  /hosts/{host_id}/init:
    post:
      tags:
      - hosts
      operationId: init
      parameters:
      - name: host_id
        in: path
        description: Host unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Host initialized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Host'
        '404':
          description: Host not found
        '500':
          description: Internal server error
  /hosts/{host_id}/numa:
    get:
      tags:
      - hosts
      operationId: list_numa_nodes
      parameters:
      - name: host_id
        in: path
        description: Host unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List NUMA nodes discovered on the host
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HostNumaNode'
        '404':
          description: Host not found
        '500':
          description: Internal server error
  /hosts/{host_id}/resources:
    get:
      tags:
      - hosts
      operationId: resources
      parameters:
      - name: host_id
        in: path
        description: Host unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Computed host resource ledger
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostResourceCapacity'
        '404':
          description: Host not found
  /hosts/{host_id}/upgrade:
    post:
      tags:
      - hosts
      operationId: node_upgrade
      parameters:
      - name: host_id
        in: path
        description: Host unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '202':
          description: Node upgrade accepted
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: No deployed image recorded for this host
        '404':
          description: Host not found
        '500':
          description: Internal server error
  /instance-types:
    get:
      tags:
      - instance-types
      operationId: list
      parameters:
      - name: name
        in: query
        description: Optional name filter for list queries
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: List all instance types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstanceType'
        '500':
          description: Internal server error
    post:
      tags:
      - instance-types
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewInstanceType'
        required: true
      responses:
        '201':
          description: Instance type created successfully
          content:
            text/plain:
              schema:
                type: string
        '409':
          description: Instance type with name already exists
        '422':
          description: Invalid input
        '500':
          description: Internal server error
  /instance-types/{instance_type_id}:
    get:
      tags:
      - instance-types
      operationId: get
      parameters:
      - name: instance_type_id
        in: path
        description: Instance type unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Instance type found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceType'
        '404':
          description: Instance type not found
        '500':
          description: Internal server error
    delete:
      tags:
      - instance-types
      operationId: delete
      parameters:
      - name: instance_type_id
        in: path
        description: Instance type unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Instance type deleted successfully
        '404':
          description: Instance type not found
        '500':
          description: Internal server error
  /jobs/{job_id}:
    get:
      tags:
      - jobs
      operationId: get
      parameters:
      - name: job_id
        in: path
        description: Job unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Job not found
        '500':
          description: Internal server error
  /networks:
    get:
      tags:
      - networks
      operationId: list
      parameters:
      - name: name
        in: query
        description: Optional name filter for list queries
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: List all networks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Network'
        '500':
          description: Internal server error
    post:
      tags:
      - networks
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewNetwork'
        required: true
      responses:
        '201':
          description: Network created successfully
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Invalid input
        '500':
          description: Internal server error
  /networks/{network_id}:
    get:
      tags:
      - networks
      operationId: get
      parameters:
      - name: network_id
        in: path
        description: Network unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Network found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Network'
        '404':
          description: Network not found
        '500':
          description: Internal server error
    delete:
      tags:
      - networks
      operationId: delete
      parameters:
      - name: network_id
        in: path
        description: Network unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Network deleted successfully
        '404':
          description: Network not found
        '500':
          description: Internal server error
  /networks/{network_id}/hosts:
    post:
      tags:
      - networks
      operationId: attach_host
      parameters:
      - name: network_id
        in: path
        description: Network unique identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachHostRequest'
        required: true
      responses:
        '204':
          description: Host attached to network
        '404':
          description: Network or host not found
        '422':
          description: Failed to attach network on node
        '500':
          description: Internal server error
  /networks/{network_id}/hosts/{host_id}:
    delete:
      tags:
      - networks
      operationId: detach_host
      parameters:
      - name: network_id
        in: path
        description: Network unique identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: host_id
        in: path
        description: Host unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Host detached from network
        '404':
          description: Host not found
        '422':
          description: Failed to detach network on node
        '500':
          description: Internal server error
  /networks/{network_id}/ips:
    get:
      tags:
      - networks
      operationId: list_ips
      parameters:
      - name: network_id
        in: path
        description: Network unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List IP allocations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IpAllocation'
        '500':
          description: Internal server error
  /sandbox-pools:
    get:
      tags:
      - sandbox-pools
      operationId: list
      responses:
        '200':
          description: List configured sandbox pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SandboxPool'
        '500':
          description: Internal server error
  /sandboxes:
    get:
      tags:
      - sandboxes
      operationId: list
      responses:
        '200':
          description: List all sandboxes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sandbox'
        '500':
          description: Internal server error
    post:
      tags:
      - sandboxes
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewSandbox'
        required: true
      responses:
        '202':
          description: Sandbox creation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSandboxResponse'
        '422':
          description: Invalid input or no available hosts
        '500':
          description: Internal server error
  /sandboxes/{sandbox_id}:
    get:
      tags:
      - sandboxes
      operationId: get
      parameters:
      - name: sandbox_id
        in: path
        description: Sandbox unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Sandbox details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sandbox'
        '404':
          description: Sandbox not found
        '500':
          description: Internal server error
    delete:
      tags:
      - sandboxes
      operationId: delete
      parameters:
      - name: sandbox_id
        in: path
        description: Sandbox unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Sandbox deleted
        '404':
          description: Sandbox not found
        '500':
          description: Internal server error
  /sandboxes/{sandbox_id}/exec:
    post:
      tags:
      - sandboxes
      operationId: exec
      parameters:
      - name: sandbox_id
        in: path
        description: Sandbox unique identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecSandboxRequest'
        required: true
      responses:
        '200':
          description: Command executed inside the sandbox
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecSandboxResponse'
        '404':
          description: Sandbox not found
        '422':
          description: Sandbox is not ready or guest exec is unavailable
        '500':
          description: Internal server error
  /scheduling/config:
    get:
      tags:
      - scheduling
      operationId: config
      responses:
        '200':
          description: Current scheduling configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulingSettings'
  /security-groups:
    get:
      tags:
      - security-groups
      operationId: list
      parameters:
      - name: name
        in: query
        description: Optional name filter for list queries
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: List security groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SecurityGroup'
        '500':
          description: Internal server error
    post:
      tags:
      - security-groups
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewSecurityGroup'
        required: true
      responses:
        '201':
          description: Security group created successfully
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Invalid input
        '500':
          description: Internal server error
  /security-groups/{security_group_id}:
    get:
      tags:
      - security-groups
      operationId: get
      parameters:
      - name: security_group_id
        in: path
        description: Security group unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Security group found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityGroup'
        '404':
          description: Security group not found
        '500':
          description: Internal server error
    delete:
      tags:
      - security-groups
      operationId: delete
      parameters:
      - name: security_group_id
        in: path
        description: Security group unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Security group deleted successfully
        '404':
          description: Security group not found
        '500':
          description: Internal server error
  /security-groups/{security_group_id}/rules:
    get:
      tags:
      - security-groups
      operationId: list_rules
      parameters:
      - name: security_group_id
        in: path
        description: Security group unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: List security-group rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SecurityGroupRule'
        '404':
          description: Security group not found
        '500':
          description: Internal server error
    post:
      tags:
      - security-groups
      operationId: create_rule
      parameters:
      - name: security_group_id
        in: path
        description: Security group unique identifier
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewSecurityGroupRule'
        required: true
      responses:
        '201':
          description: Security-group rule created successfully
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Security group not found
        '422':
          description: Invalid input
        '500':
          description: Internal server error
  /security-groups/{security_group_id}/rules/{rule_id}:
    delete:
      tags:
      - security-groups
      operationId: delete_rule
      parameters:
      - name: security_group_id
        in: path
        description: Security group unique identifier
        required: true
        schema:
          type: string
          format: uuid
      - name: rule_id
        in: path
