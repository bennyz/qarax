syntax = "proto3";
package node;

import "google/protobuf/empty.proto";

// ============================================================================
// Core VM Configuration
// ============================================================================

message VmID {
  string id = 1;
}

message VmList {
  repeated VmState vms = 1;
}

// Cloud-init NoCloud seed data. When present the node generates a VFAT "cidata"
// seed image and attaches it as a read-only disk to the VM.
message CloudInitConfig {
  string user_data = 1;        // cloud-init user-data (YAML)
  string meta_data = 2;        // cloud-init meta-data (YAML); auto-generated if empty
  string network_config = 3;   // cloud-init network-config (optional YAML)
}

message VmConfig {
  string vm_id = 1;

  // CPU configuration
  optional CpusConfig cpus = 2;

  // Memory configuration
  optional MemoryConfig memory = 3;

  // Boot/Payload configuration
  PayloadConfig payload = 4;

  // Storage configuration
  repeated DiskConfig disks = 5;

  // Network configuration
  repeated NetConfig networks = 6;

  // Device configuration
  optional RngConfig rng = 7;
  optional ConsoleConfig serial = 8;
  optional ConsoleConfig console = 9;

  // Rate limiting groups (shared across devices)
  repeated RateLimitGroupConfig rate_limit_groups = 10;

  // Filesystem (virtiofs) devices
  repeated FsConfig fs = 11;

  // Cloud-init seed data (optional)
  optional CloudInitConfig cloud_init = 12;

  // VFIO device passthrough (GPU, etc.)
  repeated VfioDeviceConfig devices = 13;

  // Virtio-vsock configuration (optional; used for host <-> guest control channels)
  optional VsockConfig vsock = 14;

  // NUMA placement (optional; set by control plane for GPU-local or explicit NUMA pinning)
  optional NumaPlacement numa_placement = 15;
}

message VsockConfig {
  optional int64 cid = 1;       // Guest CID; auto-assigned by the node when omitted
  optional string socket = 2;   // Host-side UNIX socket path; derived by the node when omitted
  optional bool iommu = 3;
  optional int32 pci_segment = 4;
  optional string id = 5;
}

// ============================================================================
// Filesystem (virtiofs) Configuration
// ============================================================================

message FsConfig {
  string tag = 1;                      // Virtiofs mount tag (used as mount source in guest)
  string socket = 2;                   // Unix socket path for the virtiofs backend (nydusd)
  int32 num_queues = 3;                // Number of virtqueues (default: 1)
  int32 queue_size = 4;                // Size of each queue (default: 1024)
  optional int32 pci_segment = 5;      // PCI segment number
  optional string id = 6;              // Device identifier
  optional string bootstrap_path = 7;  // RAFS bootstrap path (for nydusd)
}

message VmState {
  VmConfig config = 1;
  VmStatus status = 2;
  optional int64 memory_actual_size = 3;
}

// ============================================================================
// CPU Configuration
// ============================================================================

message CpusConfig {
  int32 boot_vcpus = 1;    // Number of VCPUs available at boot
  int32 max_vcpus = 2;     // Maximum number of VCPUs (for future hotplug)

  optional CpuTopology topology = 3;
  optional bool kvm_hyperv = 4;
  optional int32 max_phys_bits = 5;
}

message CpuTopology {
  optional int32 threads_per_core = 1;
  optional int32 cores_per_die = 2;
  optional int32 dies_per_package = 3;
  optional int32 packages = 4;
}

// ============================================================================
// Memory Configuration
// ============================================================================

message MemoryConfig {
  int64 size = 1;                      // Base memory size in bytes
  optional int64 hotplug_size = 2;     // Maximum hotplug memory size
  optional bool mergeable = 3;         // KSM support
  optional bool shared = 4;            // Shared memory for vhost-user
  optional bool hugepages = 5;         // Use hugepages
  optional int64 hugepage_size = 6;    // Hugepage size in bytes
  optional bool prefault = 7;          // Prefault memory
  optional bool thp = 8;               // Transparent hugepages
}

// ============================================================================
// Payload/Boot Configuration
// ============================================================================

message PayloadConfig {
  optional string kernel = 1;      // Path to kernel image
  optional string cmdline = 2;     // Kernel command line
  optional string initramfs = 3;   // Path to initramfs
  optional string firmware = 4;    // Path to firmware (UEFI)
}

// ============================================================================
// Disk Configuration
// ============================================================================

message DiskConfig {
  string id = 1;                       // Unique disk identifier
  optional string path = 2;            // Path on host (not for vhost-user)
  optional bool readonly = 3;
  optional bool direct = 4;            // O_DIRECT flag

  // vhost-user configuration
  optional bool vhost_user = 5;
  optional string vhost_socket = 6;

  // Performance tuning
  optional int32 num_queues = 7;
  optional int32 queue_size = 8;
  optional RateLimiterConfig rate_limiter = 9;
  optional string rate_limit_group = 10;

  // Device metadata
  optional int32 pci_segment = 11;
  optional string serial = 12;         // Disk serial number

  // OverlayBD lazy-loading support
  optional string oci_image_ref = 13;  // OCI image ref in local registry
  optional string registry_url  = 14;  // e.g. "http://my-registry:5000"

  // Persistent upper layer paths (linked-persistent OverlayBD VMs).
  // When set, the overlaybd manager uses these paths instead of deriving
  // ephemeral paths inside the cache directory (which would be deleted on stop).
  optional string upper_data_path  = 15;
  optional string upper_index_path = 16;
}

// ============================================================================
// Network Configuration (Priority)
// ============================================================================

message NetConfig {
  string id = 1;                       // Unique network interface identifier

  // TAP interface configuration
  optional string tap = 2;             // Pre-created TAP device name

  // IP configuration
  optional string ip = 3;              // IPv4 or IPv6 address
  optional string mask = 4;            // Network mask

  // MAC addresses
  optional string mac = 5;             // Guest MAC address
  optional string host_mac = 6;        // Host-side MAC address

  // Network parameters
  optional int32 mtu = 7;

  // vhost-user configuration
  optional bool vhost_user = 8;
  optional string vhost_socket = 9;
  optional VhostMode vhost_mode = 10;

  // Performance tuning
  optional int32 num_queues = 11;      // Number of virtio queues
  optional int32 queue_size = 12;      // Size of each queue
  optional RateLimiterConfig rate_limiter = 13;

  // Offload features
  optional bool offload_tso = 14;      // TCP Segmentation Offload
  optional bool offload_ufo = 15;      // UDP Fragmentation Offload
  optional bool offload_csum = 16;     // Checksum offload

  // PCI configuration
  optional int32 pci_segment = 17;
  optional bool iommu = 18;

  // Bridge to attach TAP to (for managed networking)
  optional string bridge = 19;
}

enum VhostMode {
  VHOST_MODE_CLIENT = 0;
  VHOST_MODE_SERVER = 1;
}

// ============================================================================
// Rate Limiting Configuration
// ============================================================================

message RateLimiterConfig {
  optional TokenBucket bandwidth = 1;  // Bandwidth limiting (bytes/s)
  optional TokenBucket ops = 2;        // Operations limiting (ops/s)
}

message TokenBucket {
  int64 size = 1;                      // Maximum bucket size
  int64 refill_time = 2;               // Refill interval in milliseconds
  optional int64 one_time_burst = 3;   // Initial burst size
}

message RateLimitGroupConfig {
  string id = 1;
  RateLimiterConfig config = 2;
}

// ============================================================================
// Device Configuration
// ============================================================================

message ConsoleConfig {
  ConsoleMode mode = 1;
  optional string file = 2;    // For File mode
  optional string socket = 3;  // For Socket mode
  optional bool iommu = 4;
}

enum ConsoleMode {
  CONSOLE_MODE_OFF = 0;
  CONSOLE_MODE_PTY = 1;
  CONSOLE_MODE_TTY = 2;
  CONSOLE_MODE_FILE = 3;
  CONSOLE_MODE_SOCKET = 4;
  CONSOLE_MODE_NULL = 5;
}

message RngConfig {
  string src = 1;              // Path to entropy source (e.g., /dev/urandom)
  optional bool iommu = 2;
}

// ============================================================================
// VM Status and Lifecycle
// ============================================================================

enum VmStatus {
  VM_STATUS_UNKNOWN = 0;     // Unknown state
  VM_STATUS_CREATED = 1;     // VM created but not started
  VM_STATUS_RUNNING = 2;     // VM is running
  VM_STATUS_PAUSED = 3;      // VM is paused
  VM_STATUS_SHUTDOWN = 4;    // VM has shut down
}

// ============================================================================
// VM Counters
// ============================================================================

message DeviceCounters {
  map<string, int64> values = 1;
}

message VmCounters {
  map<string, DeviceCounters> counters = 1;
}

message ConsoleLogResponse {
  string content = 1;     // Console log text
  bool available = 2;     // false if console logging was not enabled
}

message ConsoleInput {
  string vm_id = 1;       // VM identifier (only needed in first message)
  bytes data = 2;         // Input data to send to console
  bool resize = 3;        // If true, this is a resize request
  uint32 rows = 4;        // Terminal rows (for resize)
  uint32 cols = 5;        // Terminal columns (for resize)
}

message ConsoleOutput {
  bytes data = 1;         // Output data from console
  bool error = 2;         // If true, this is an error message
  string error_message = 3; // Error description (if error=true)
}

message ConsolePtyPathResponse {
  string pty_path = 1;    // Path to PTY device
  bool available = 2;     // Whether PTY console is available
}

message ExecVmRequest {
  string vm_id = 1;
  repeated string command = 2;
  optional uint64 timeout_secs = 3;
}

message ExecVmResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  bool timed_out = 4;
}

message NodeInfo {
  string hostname = 1;
  string cloud_hypervisor_version = 2;
  string kernel_version = 3;
  // Resource info
  int32 total_cpus = 4;
  int64 total_memory_bytes = 5;
  int64 available_memory_bytes = 6;
  double load_average_1m = 7;
  int64 disk_total_bytes = 8;
  int64 disk_available_bytes = 9;
  // GPU inventory (discovered via sysfs, only devices bound to vfio-pci)
  repeated GpuInfo gpus = 10;
  // Version of the qarax-node binary
  string node_version = 11;
  // NUMA topology of the host
  repeated NumaNode numa_nodes = 12;
  string architecture = 13;
}

// ============================================================================
// VFIO Device Passthrough
// ============================================================================

message VfioDeviceConfig {
  string id = 1;
  string path = 2;                // VFIO sysfs path: "/sys/bus/pci/devices/0000:01:00.0"
  optional bool iommu = 3;
  optional int32 pci_segment = 4;
}

message GpuInfo {
  string pci_address = 1;         // "0000:01:00.0"
  string model = 2;
  string vendor = 3;
  int64 vram_bytes = 4;
  int32 iommu_group = 5;
  int32 numa_node = 6;            // NUMA node this GPU is local to (-1 if unknown)
}

// ============================================================================
// NUMA Topology
// ============================================================================

message NumaNode {
  int32 id = 1;
  repeated int32 cpus = 2;        // host CPU IDs belonging to this NUMA node
  int64 memory_bytes = 3;         // total memory on this NUMA node
  repeated int32 distances = 4;   // SLIT row: distances[i] = distance to node i
}

message CpuPinning {
  int32 vcpu = 1;
  repeated int32 host_cpus = 2;   // host CPU IDs this vCPU may run on
}

message NumaPlacement {
  repeated int32 host_numa_node_ids = 1;   // host NUMA nodes this VM is pinned to
  repeated CpuPinning cpu_pinning = 2;     // per-vCPU host CPU affinity
  repeated string memory_zone_ids = 3;     // CH memory zone IDs (e.g. "zone0")
}

// ============================================================================
// gRPC Service Definition
// ============================================================================

message SnapshotVmRequest {
  string vm_id        = 1;
  string snapshot_url = 2;
}

message RestoreVmRequest {
  string vm_id      = 1;
  string source_url = 2;
}

// ReceiveMigrationRequest is sent to the *destination* node to prepare it for
// an incoming live migration.  The destination spawns a Cloud Hypervisor
// process, sets up the required TAP devices using the supplied VmConfig, then
// calls vm.receive-migration.  The caller must pass the returned receiver_url
// to the source node's SendMigration RPC.
message ReceiveMigrationRequest {
  string vm_id       = 1;
  VmConfig config    = 2;
  int32 migration_port = 3; // TCP port to listen on; 0 means auto-assign
}

message ReceiveMigrationResponse {
  string receiver_url = 1; // e.g. "tcp://0.0.0.0:49152"
}

// SendMigrationRequest is sent to the *source* node to initiate an outbound
// live migration.  destination_url is the receiver_url returned by
// ReceiveMigration (with 0.0.0.0 replaced by the real destination IP).
message SendMigrationRequest {
  string vm_id            = 1;
  string destination_url  = 2; // e.g. "tcp://192.168.1.20:49152"
}

service VmService {
  // Node information
  rpc GetNodeInfo(google.protobuf.Empty) returns (NodeInfo) {}

  // VM lifecycle operations
  rpc CreateVM(VmConfig) returns (VmState) {}
  rpc StartVM(VmID) returns (google.protobuf.Empty) {}
  rpc StopVM(VmID) returns (google.protobuf.Empty) {}
  rpc ForceStopVM(VmID) returns (google.protobuf.Empty) {}
  rpc PauseVM(VmID) returns (google.protobuf.Empty) {}
  rpc ResumeVM(VmID) returns (google.protobuf.Empty) {}
  rpc SnapshotVM(SnapshotVmRequest) returns (google.protobuf.Empty) {}
  rpc RestoreVM(RestoreVmRequest) returns (google.protobuf.Empty) {}
  rpc DeleteVM(VmID) returns (google.protobuf.Empty) {}

  // Live migration
  rpc ReceiveMigration(ReceiveMigrationRequest) returns (ReceiveMigrationResponse) {}
  rpc SendMigration(SendMigrationRequest) returns (google.protobuf.Empty) {}

  // VM information
  rpc GetVmInfo(VmID) returns (VmState) {}
  rpc ListVms(google.protobuf.Empty) returns (VmList) {}
  rpc GetVmCounters(VmID) returns (VmCounters) {}
  rpc ReadConsoleLog(VmID) returns (ConsoleLogResponse) {}
  rpc ExecVM(ExecVmRequest) returns (ExecVmResponse) {}

  // Console streaming (for PTY/interactive console access)
  rpc AttachConsole(stream ConsoleInput) returns (stream ConsoleOutput) {}
  rpc GetConsolePtyPath(VmID) returns (ConsolePtyPathResponse) {}

  // Hot-attach operations (for future use)
  rpc AddNetworkDevice(AddNetworkDeviceRequest) returns (google.protobuf.Empty) {}
  rpc RemoveNetworkDevice(RemoveDeviceRequest) returns (google.protobuf.Empty) {}
  rpc AddDiskDevice(AddDiskDeviceRequest) returns (google.protobuf.Empty) {}
  rpc RemoveDiskDevice(RemoveDeviceRequest) returns (google.protobuf.Empty) {}

  // Filesystem (virtiofs) hot-attach operations
  rpc AddFsDevice(AddFsDeviceRequest) returns (google.protobuf.Empty) {}
  rpc RemoveFsDevice(RemoveDeviceRequest) returns (google.protobuf.Empty) {}

  // VFIO device hot-attach operations (GPU passthrough)
  rpc AddDevice(AddDeviceRequest) returns (google.protobuf.Empty) {}
  rpc RemoveVfioDevice(RemoveDeviceRequest) returns (google.protobuf.Empty) {}

  // CPU and memory hotplug (resize running VM)
  rpc ResizeVm(ResizeVmRequest) returns (google.protobuf.Empty) {}

  // Disk resize (extend backing file; VM must be stopped)
  rpc ResizeDisk(ResizeDiskRequest) returns (google.protobuf.Empty) {}

  // OCI image management
  rpc PullImage(OciImageRequest) returns (OciImageResponse) {}
  rpc GetImageStatus(OciImageRequest) returns (OciImageResponse) {}

  // OverlayBD image import (convert OCI image for lazy block loading)
  rpc ImportOverlayBdImage(ImportOverlayBdRequest) returns (ImportOverlayBdResponse) {}

  // Storage pool lifecycle (mount NFS, verify OverlayBD registry, create local dir, etc.)
  rpc AttachStoragePool(AttachStoragePoolRequest) returns (AttachStoragePoolResponse) {}
  rpc DetachStoragePool(DetachStoragePoolRequest) returns (google.protobuf.Empty) {}

  // Network lifecycle (bridge + DHCP + NAT setup/teardown)
  rpc AttachNetwork(AttachNetworkRequest) returns (AttachNetworkResponse) {}
  rpc DetachNetwork(DetachNetworkRequest) returns (DetachNetworkResponse) {}
}

// ============================================================================
// File Transfer Service
// ============================================================================

message DownloadFileRequest {
  string transfer_id = 1;
  string source_url = 2;
  string destination_path = 3;
}

message CopyFileRequest {
  string transfer_id = 1;
  string source_path = 2;
  string destination_path = 3;
}

message TransferResponse {
  string transfer_id = 1;
  bool success = 2;
  int64 bytes_written = 3;
  string error = 4;
}

service FileTransferService {
  rpc DownloadFile(DownloadFileRequest) returns (TransferResponse) {}
  rpc CopyFile(CopyFileRequest) returns (TransferResponse) {}
}

// ============================================================================
// Hot-attach Messages
// ============================================================================

message AddNetworkDeviceRequest {
  string vm_id = 1;
  NetConfig config = 2;
}

message AddDiskDeviceRequest {
  string vm_id = 1;
  DiskConfig config = 2;
}

message AddFsDeviceRequest {
  string vm_id = 1;
  FsConfig config = 2;
}

message AddDeviceRequest {
  string vm_id = 1;
  VfioDeviceConfig config = 2;
}

message RemoveDeviceRequest {
  string vm_id = 1;
  string device_id = 2;
}

message ResizeVmRequest {
  string vm_id = 1;
  optional int32 desired_vcpus = 2;  // Target vCPU count (must be within boot_vcpus..max_vcpus)
  optional int64 desired_ram = 3;    // Target memory in bytes (must be within size..size+hotplug_size)
}

message ResizeDiskRequest {
  string vm_id    = 1;
  string disk_id  = 2;   // logical_name of the disk (e.g. "rootfs", "disk0")
  string path     = 3;   // absolute host path to the backing raw file
  int64  new_size = 4;   // target size in bytes (must be > current size)
}

// ============================================================================
// OCI Image Management
// ============================================================================

message OciImageRequest {
  string image_ref = 1;   // OCI image reference (e.g. "docker.io/library/ubuntu:22.04")
}

// ============================================================================
// OverlayBD Image Import
// ============================================================================

message ImportOverlayBdRequest {
  string image_ref    = 1;   // source: e.g. "docker.io/library/ubuntu:22.04"
  string registry_url = 2;   // target registry URL, e.g. "http://my-registry:5000"
}

message ImportOverlayBdResponse {
  string image_ref = 1;   // converted ref in target registry
  string digest    = 2;   // sha256:...
  bool available   = 3;
}

// ============================================================================
// Storage Pool Attachment
// ============================================================================

enum StoragePoolKind {
  STORAGE_POOL_KIND_LOCAL    = 0;
  STORAGE_POOL_KIND_NFS      = 1;
  STORAGE_POOL_KIND_OVERLAYBD = 2;
}

// Request to physically attach a storage pool on a node.
// The config_json field carries pool-type-specific configuration:
//   LOCAL:     {"path": "/var/lib/qarax/storage/..."}
//   NFS:       {"url": "nfs-server:/export/path"}
//   OVERLAYBD: {"url": "http://registry:5000"}
message AttachStoragePoolRequest {
  string pool_id    = 1;   // UUID of the storage pool
  StoragePoolKind pool_kind = 2;
  string config_json = 3;  // JSON-encoded pool config
}

message AttachStoragePoolResponse {
  bool success       = 1;
  string message     = 2;
}

message DetachStoragePoolRequest {
  string pool_id    = 1;
  StoragePoolKind pool_kind = 2;
}

// ============================================================================
// Network Attachment
// ============================================================================

message AttachNetworkRequest {
    string bridge_name = 1;
    string subnet = 2;          // CIDR e.g. "10.0.0.0/24"
    string gateway = 3;         // e.g. "10.0.0.1"
    string dns = 4;             // optional, defaults to gateway
    string dhcp_range_start = 5;
    string dhcp_range_end = 6;
    string parent_interface = 7; // if set, bridge this NIC instead of isolated bridge
}

message AttachNetworkResponse {}

message DetachNetworkRequest {
    string bridge_name = 1;
}

message DetachNetworkResponse {}

message OciImageResponse {
  string image_ref = 1;   // OCI image reference
  string digest = 2;      // Content digest (sha256:...)
  string bootstrap_path = 3;  // Path to RAFS bootstrap file on host
  string socket_path = 4;     // Path to nydusd socket (set after start_nydusd)
  bool available = 5;     // Whether the image is locally cached
}
