name: Rust CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

env:
  DAGGER_VERSION: v0.20.6

jobs:
  check:
    name: CI Checks (fmt + lint + test)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.action != 'labeled' || github.event.label.name != 'run-e2e'
    steps:
      - uses: actions/checkout@v6

      - name: Cache Dagger engine image
        uses: actions/cache@v4
        with:
          path: /tmp/dagger-engine.tar
          key: dagger-engine-${{ env.DAGGER_VERSION }}

      # Unique key per run so we always write an up-to-date cache entry.
      # restore-keys finds the most recent entry for the same Dagger version.
      - name: Cache Dagger data volume
        uses: actions/cache@v4
        with:
          path: /tmp/dagger-data.tar.zst
          key: dagger-data-${{ env.DAGGER_VERSION }}-${{ github.run_id }}
          restore-keys: dagger-data-${{ env.DAGGER_VERSION }}-

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=${{ env.DAGGER_VERSION }} BIN_DIR=/usr/local/bin sh

      - name: Load or pull Dagger engine image
        run: |
          if [ -f /tmp/dagger-engine.tar ]; then
            docker load < /tmp/dagger-engine.tar
          else
            docker pull registry.dagger.io/engine:${{ env.DAGGER_VERSION }}
            docker save registry.dagger.io/engine:${{ env.DAGGER_VERSION }} -o /tmp/dagger-engine.tar
          fi

      - name: Create Dagger data volume and restore cache
        run: |
          docker volume create dagger-data
          if [ -f /tmp/dagger-data.tar.zst ]; then
            echo "Restoring Dagger data volume from cache..."
            docker run --rm \
              -v dagger-data:/data \
              -v /tmp/dagger-data.tar.zst:/backup.tar.zst \
              alpine sh -c "apk add -q zstd && zstd -d /backup.tar.zst -c | tar -xf - -C /data"
            echo "Restored Dagger data volume"
          else
            echo "No cached volume found, starting cold"
          fi

      - name: Start Dagger engine
        run: |
          docker run --name dagger-engine-${{ env.DAGGER_VERSION }} \
            -d --init --restart always \
            -v dagger-data:/var/lib/dagger \
            --privileged \
            registry.dagger.io/engine:${{ env.DAGGER_VERSION }} --debug

      - name: Run CI checks
        run: dagger call --mod ./ci all --src=.

      - name: Save Dagger data volume
        if: always()
        run: |
          echo "Saving Dagger data volume..."
          docker run --rm \
            -v dagger-data:/data \
            -v /tmp:/backup \
            alpine sh -c "apk add -q zstd && tar -cf - -C /data . | zstd -f -o /backup/dagger-data.tar.zst"
          echo "Saved: $(du -sh /tmp/dagger-data.tar.zst | cut -f1)"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Dagger engine image
        uses: actions/cache@v4
        with:
          path: /tmp/dagger-engine.tar
          key: dagger-engine-${{ env.DAGGER_VERSION }}

      - name: Cache Dagger data volume
        uses: actions/cache@v4
        with:
          path: /tmp/dagger-data.tar.zst
          key: dagger-data-build-${{ env.DAGGER_VERSION }}-${{ github.run_id }}
          restore-keys: dagger-data-build-${{ env.DAGGER_VERSION }}-

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=${{ env.DAGGER_VERSION }} BIN_DIR=/usr/local/bin sh

      - name: Load or pull Dagger engine image
        run: |
          if [ -f /tmp/dagger-engine.tar ]; then
            docker load < /tmp/dagger-engine.tar
          else
            docker pull registry.dagger.io/engine:${{ env.DAGGER_VERSION }}
            docker save registry.dagger.io/engine:${{ env.DAGGER_VERSION }} -o /tmp/dagger-engine.tar
          fi

      - name: Create Dagger data volume and restore cache
        run: |
          docker volume create dagger-data
          if [ -f /tmp/dagger-data.tar.zst ]; then
            echo "Restoring Dagger data volume from cache..."
            docker run --rm \
              -v dagger-data:/data \
              -v /tmp/dagger-data.tar.zst:/backup.tar.zst \
              alpine sh -c "apk add -q zstd && zstd -d /backup.tar.zst -c | tar -xf - -C /data"
            echo "Restored Dagger data volume"
          else
            echo "No cached volume found, starting cold"
          fi

      - name: Start Dagger engine
        run: |
          docker run --name dagger-engine-${{ env.DAGGER_VERSION }} \
            -d --init --restart always \
            -v dagger-data:/var/lib/dagger \
            --privileged \
            registry.dagger.io/engine:${{ env.DAGGER_VERSION }} --debug

      - name: Build release binaries
        run: |
          mkdir -p target/x86_64-unknown-linux-musl/release
          dagger call --mod ./ci build --src=. export \
            --path=./target/x86_64-unknown-linux-musl/release

      - name: Save Dagger data volume
        if: always()
        run: |
          echo "Saving Dagger data volume..."
          docker run --rm \
            -v dagger-data:/data \
            -v /tmp:/backup \
            alpine sh -c "apk add -q zstd && tar -cf - -C /data . | zstd -f -o /backup/dagger-data.tar.zst"
          echo "Saved: $(du -sh /tmp/dagger-data.tar.zst | cut -f1)"

      - name: Upload binaries
        uses: actions/upload-artifact@v6
        with:
          name: binaries
          path: |
            target/x86_64-unknown-linux-musl/release/qarax-server
            target/x86_64-unknown-linux-musl/release/qarax-node
            target/x86_64-unknown-linux-musl/release/qarax-init
            target/x86_64-unknown-linux-musl/release/qarax
          retention-days: 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'run-e2e') ||
      (github.event_name == 'pull_request' && github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'run-e2e'))
    steps:
      - uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v7
        with:
          name: binaries
          path: target/x86_64-unknown-linux-musl/release/

      - name: Make binaries executable
        run: chmod +x target/x86_64-unknown-linux-musl/release/*

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Check KVM availability
        run: |
          if [ -e /dev/kvm ]; then
            echo "KVM is available"
            ls -la /dev/kvm
          else
            echo "KVM is NOT available - E2E tests will be skipped"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          use: true

      - name: Expose GitHub runtime for BuildKit cache
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: |
            e2e/pyproject.toml
            e2e/uv.lock
            python-sdk/pyproject.toml
            python-sdk/uv.lock

      - name: Install e2e dependencies
        run: sudo apt-get update && sudo apt-get install -y qemu-utils

      - name: Run E2E tests
        run: SKIP_BUILD=1 ENABLE_OTEL=1 CLOUD_HYPERVISOR_VERSION=$(cat versions/cloud-hypervisor-version | tr -d '\n') bash e2e/run_e2e_tests.sh
        env:
          COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
          DOCKER_BUILDX: 1
          DOCKER_BUILD_CACHE_FROM: type=gha
          DOCKER_BUILD_CACHE_TO: type=gha,mode=max

      - name: Cleanup
        if: always()
        working-directory: e2e
        run: docker compose down -v
        env:
          COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
