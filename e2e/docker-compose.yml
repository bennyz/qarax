services:
  nfs-server:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.nfs-server
    privileged: true
    environment:
      SHARED_DIRECTORY: /nfs-export
    volumes:
      - nfs_export:/nfs-export
    healthcheck:
      test: [ "CMD", "sh", "-c", "rpcinfo -p localhost > /dev/null 2>&1" ]
      interval: 5s
      timeout: 5s
      retries: 10

  registry:
    image: registry:2
    ports:
      - "5001:5000"
    volumes:
      - registry_data:/var/lib/registry
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "5000" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qarax
      POSTGRES_PASSWORD: qarax
      POSTGRES_DB: qarax
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U qarax" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qarax-node-2:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.qarax-node
      args:
        CLOUD_HYPERVISOR_VERSION: ${CLOUD_HYPERVISOR_VERSION}
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/net/tun:/dev/net/tun
      - /dev/vhost-vsock:/dev/vhost-vsock
    volumes:
      - ${PRODUCTION_IMAGES_DIR:-/tmp/qarax-no-production-images}:/var/lib/qarax/production-images:rw
      - qarax_storage_2:/var/lib/qarax/storage
      - qarax_vms_2:/var/lib/qarax/vms
      - qarax_overlaybd_2:/var/lib/qarax/overlaybd
      - /lib/modules:/lib/modules:ro
      - /sys/kernel/config:/sys/kernel/config
    environment:
      START_OVERLAYBD_TCMU: "0"
      OVERLAYBD_REGISTRY_URL: http://registry:5000
      INSECURE_REGISTRIES: registry:5000
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:14318}
      OTEL_BSP_SCHEDULE_DELAY: ${OTEL_BSP_SCHEDULE_DELAY:-5000}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-60000}
    ports:
      - "50052:50051"
    depends_on:
      registry:
        condition: service_healthy
      nfs-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "50051" ]
      interval: 5s
      timeout: 5s
      retries: 10

  qarax:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.qarax
    environment:
      DATABASE_URL: postgres://qarax:qarax@postgres:5432/qarax
      DATABASE_HOST: postgres
      APP_ENVIRONMENT: local
      QARAX_CONFIG_DIR: /app/configuration
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:14318}
      OTEL_BSP_SCHEDULE_DELAY: ${OTEL_BSP_SCHEDULE_DELAY:-5000}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-60000}
      # VM defaults - can be overridden from environment
      VM_KERNEL: ${VM_KERNEL:-/var/lib/qarax/images/vmlinux}
      VM_INITRAMFS: ${VM_INITRAMFS:-/var/lib/qarax/images/test-initramfs.gz}
      VM_CMDLINE: ${VM_CMDLINE:-console=ttyS0 reboot=k panic=1}
      VM_ROOTFS: ${PRODUCTION_ROOTFS:-}
      VM_FIRMWARE: ${VM_FIRMWARE:-/usr/share/cloud-hypervisor/CLOUDHV.fd}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qarax-node:
        condition: service_healthy
      qarax-node-2:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 5s
      timeout: 5s
      retries: 10

  qarax-node:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.qarax-node
      args:
        CLOUD_HYPERVISOR_VERSION: ${CLOUD_HYPERVISOR_VERSION}
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/net/tun:/dev/net/tun # Required for VM network interfaces (virtio-net/tap)
      - /dev/vhost-vsock:/dev/vhost-vsock
    volumes:
      # Mount local images if they exist (for --with-vm mode)
      # Default location: ./local-test-images (created by run-local.sh --with-vm)
      # Note: rw is needed because rootfs.img needs to be writable by VMs
      - ${PRODUCTION_IMAGES_DIR:-/tmp/qarax-no-production-images}:/var/lib/qarax/production-images:rw
      - qarax_storage:/var/lib/qarax/storage
      - qarax_vms:/var/lib/qarax/vms
      - qarax_overlaybd:/var/lib/qarax/overlaybd
      # Required for modprobe to load host kernel modules (e.g. target_core_user for overlaybd-tcmu)
      - /lib/modules:/lib/modules:ro
      # Share host configfs so overlaybd-tcmu can see the target subsystem after modprobe
      - /sys/kernel/config:/sys/kernel/config
    environment:
      # Registry URL for OverlayBD image imports
      OVERLAYBD_REGISTRY_URL: http://registry:5000
      # Allow HTTP pulls from the local test registry (oci-client defaults to HTTPS)
      INSECURE_REGISTRIES: registry:5000
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:14318}
      OTEL_BSP_SCHEDULE_DELAY: ${OTEL_BSP_SCHEDULE_DELAY:-5000}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-60000}
    ports:
      - "50051:50051"
    depends_on:
      registry:
        condition: service_healthy
      nfs-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "50051" ]
      interval: 5s
      timeout: 5s
      retries: 10

  bootc-vm:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.qemu-vm
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    volumes:
      - ./bootc-vm-overlay.qcow2:/disk/bootc-vm-overlay.qcow2
      - ./bootc-vm-base.qcow2:/disk/bootc-vm-base.qcow2
    depends_on:
      registry:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "50051" ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s

volumes:
  postgres_data:
  registry_data:
  qarax_storage:
  qarax_vms:
  qarax_overlaybd:
  qarax_storage_2:
  qarax_vms_2:
  qarax_overlaybd_2:
  nfs_export:
