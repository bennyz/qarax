name: Appliance Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish (default: dev-<short-sha>)"
        required: false
        type: string
      cloud_hypervisor_version:
        description: "Cloud Hypervisor version build arg"
        required: false
        default: ""
        type: string
      push_latest:
        description: "Also publish the latest tag"
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/qarax-vmm-host
  TARGET_TRIPLE: x86_64-unknown-linux-musl

jobs:
  publish:
    name: Build and Publish Appliance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y musl-tools protobuf-compiler

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve release parameters
        id: vars
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              # Version tag (v*): publish the version tag + latest
              image_tag="${GITHUB_REF_NAME}"
              extra_tags="${REGISTRY}/${IMAGE_NAME}:latest"
            else
              # Master branch: only update latest — no per-commit tags
              image_tag="latest"
              extra_tags=""
            fi
          else
            # workflow_dispatch: one-off dev tag, no latest unless opted in
            image_tag="${{ inputs.image_tag }}"
            if [ -z "${image_tag}" ]; then
              image_tag="dev-${GITHUB_SHA::12}"
            fi
            if [ "${{ inputs.push_latest }}" = "true" ]; then
              extra_tags="${REGISTRY}/${IMAGE_NAME}:latest"
            else
              extra_tags=""
            fi
          fi

          cloud_hv="${{ inputs.cloud_hypervisor_version }}"
          if [ -z "${cloud_hv}" ]; then
            cloud_hv="$(tr -d '\n' < versions/cloud-hypervisor-version)"
          fi

          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "extra_tags=${extra_tags}" >> "${GITHUB_OUTPUT}"
          echo "cloud_hv=${cloud_hv}" >> "${GITHUB_OUTPUT}"

      - name: Build release binaries
        run: cargo build --release -p qarax-node -p qarax-init --target "${TARGET_TRIPLE}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push appliance image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/Containerfile.qarax-vmm
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.extra_tags }}
          build-args: |
            CLOUD_HYPERVISOR_VERSION=${{ steps.vars.outputs.cloud_hv }}
            QARAX_VERSION=${{ steps.vars.outputs.image_tag }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign published image (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          image_ref="${REGISTRY}/${IMAGE_NAME}@${{ steps.image.outputs.digest }}"
          cosign sign "${image_ref}"

      - name: Clean up old image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: qarax-vmm-host
          package-type: container
          min-versions-to-keep: 1
          delete-only-untagged-versions: true

      - name: Clean up old cosign signature versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          package_versions=$(
            gh api --paginate \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${{ github.repository_owner }}/packages/container/qarax-vmm-host/versions?per_page=100"
          )

          signature_version_ids=$(
            jq -rs '
              add
              | map(select(any(.metadata.container.tags[]?; test("^sha256-.*\\.sig$"))))
              | sort_by(.created_at)
              | .[0:-1]
              | .[].id
            ' <<<"${package_versions}"
          )

          if [ -z "${signature_version_ids}" ]; then
            echo "No old cosign signature versions to delete"
            exit 0
          fi

          while IFS= read -r version_id; do
            [ -n "${version_id}" ] || continue
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${{ github.repository_owner }}/packages/container/qarax-vmm-host/versions/${version_id}"
            echo "Deleted old cosign signature version ${version_id}"
          done <<<"${signature_version_ids}"

      - name: Publish summary
        run: |
          echo "## Appliance image published" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Image: \`${REGISTRY}/${IMAGE_NAME}:${{ steps.vars.outputs.image_tag }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Digest: \`${{ steps.image.outputs.digest }}\`" >> "${GITHUB_STEP_SUMMARY}"
          if [ -n "${{ steps.vars.outputs.extra_tags }}" ]; then
            echo "- Also tagged: \`${{ steps.vars.outputs.extra_tags }}\`" >> "${GITHUB_STEP_SUMMARY}"
          fi
