name: Comment Trigger E2E

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label:
    name: Label PR For E2E
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) && contains(github.event.comment.body, '/run-e2e')
    steps:
      - name: Add E2E label to PR
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;
            const label = 'run-e2e';

            const { data: existingLabels } = await github.rest.issues.listLabelsOnIssue({
              owner,
              repo,
              issue_number,
            });

            if (existingLabels.some(existing => existing.name === label)) {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number,
                name: label,
              });
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [label],
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: 'Queued E2E on this PR by adding the `run-e2e` label. Watch the PR checks for a new `Rust CI` run with `E2E Tests`.',
            });
